name: Release to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_release_version.py --expected "${{ github.event.release.tag_name }}"

  build:
    needs: verify-version
    uses: ./.github/workflows/wheels.yml

  publish:
    name: Publish to PyPI
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/aura-memory/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
