name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release-metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_release_version.py

  rust-checks:
    name: Rust Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Cleanup stale Windows test locks
        if: runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1
      - name: Cargo check
        run: cargo check --lib --tests --no-default-features --features "encryption,audit"
      - name: Cleanup stale Windows test locks (post)
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1

  rust-tests:
    name: Rust Unit Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Build library tests
        run: cargo test --lib --no-default-features --features "encryption,audit" --no-run 2>&1 | tail -5
      - name: Run library tests
        run: cargo test --lib --no-default-features --features "encryption,audit" -- --test-threads=2

  rust-windows-smoke:
    name: Rust Smoke (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Cleanup stale Windows test locks
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1
      - name: Run bounded Windows smoke test
        run: cargo test test_startup_validation_report_captures_recovery_fallbacks --lib --no-default-features --features "encryption,audit"
      - name: Cleanup stale Windows test locks (post)
        if: always()
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1

  python-tests:
    name: Python Tests (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create venv and install deps
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin pytest pytest-timeout
        if: runner.os != 'Windows'
      - name: Create venv and install deps (Windows)
        run: |
          python -m venv .venv
          .venv\Scripts\pip install maturin pytest pytest-timeout
        if: runner.os == 'Windows'
      - name: Cleanup stale Windows test locks
        if: runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1
      - name: Build and install
        run: .venv/bin/maturin develop --release --features "pyo3/extension-module,encryption"
        if: runner.os != 'Windows'
      - name: Build and install (Windows)
        run: .venv\Scripts\maturin develop --release --features "pyo3/extension-module,encryption"
        if: runner.os == 'Windows'
      - name: Run Python smoke
        run: .venv/bin/python scripts/python_release_smoke.py
        if: runner.os != 'Windows'
      - name: Run Python smoke (Windows)
        run: .venv\Scripts\python scripts\python_release_smoke.py
        if: runner.os == 'Windows'
      - name: Cleanup stale Windows test locks (post)
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\cleanup_windows_test_lock.ps1
